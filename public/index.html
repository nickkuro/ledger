<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"></script>
<style>
:root[data-theme="dark"] {
  --bg: #14181c; --surface: #1b2126; --surface-hi: #222a30; --border: #2b333a;
  --ink: #ece8e1; --ink-mid: #a8b4be; --ink-dim: #617078;
  --accent: #e8a33d; --accent-ink: #1b130a;
  --teal: #4fa8a0; --danger: #c9605a; --green: #6fbf73;
  --shadow: rgba(0,0,0,0.45); --hole: #14181c;
}
:root[data-theme="light"] {
  --bg: #e7e8e2; --surface: #f6f6f2; --surface-hi: #ffffff; --border: #d5d6ce;
  --ink: #20242a; --ink-mid: #6b7077; --ink-dim: #9ba3aa;
  --accent: #c9842f; --accent-ink: #fff8ec;
  --teal: #2f8f87; --danger: #b23b3b; --green: #4a8f4a;
  --shadow: rgba(20,20,15,0.12); --hole: #e7e8e2;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; font-size: 15px; }
button, input, textarea, select { font-family: inherit; color: inherit; background: none; border: none; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ===================== LOGIN ===================== */
.login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 100;
}
.login-card {
  text-align: center; padding: 44px 40px; border: 1px solid var(--border);
  border-radius: 10px; background: var(--surface); max-width: 340px; width: 90%;
}
.login-mark { font-size: 32px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; display: block; margin-bottom: 8px; }
.login-card h1 { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.14em; font-size: 18px; margin-bottom: 10px; }
.login-card p { color: var(--ink-mid); font-size: 13px; line-height: 1.6; margin-bottom: 26px; }
.discord-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: #5865F2; color: #fff; padding: 12px 20px;
  border-radius: 7px; font-weight: 600; font-size: 14px; text-decoration: none;
}
.discord-btn:hover { filter: brightness(1.1); }

/* ===================== APP SHELL ===================== */
.app { display: none; height: 100vh; width: 100vw; }
.app.ready { display: flex; }

/* ===================== SIDEBAR ===================== */
.sidebar {
  width: 300px; min-width: 300px; background: var(--bg);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; height: 100vh; overflow: hidden;
}

/* --- top bar --- */
.sidebar-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px 10px; flex-shrink: 0;
}
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand-mark { color: var(--accent); font-size: 17px; font-family: 'IBM Plex Mono', monospace; }
.brand-name { font-family: 'IBM Plex Mono', monospace; font-weight: 600; letter-spacing: 0.14em; font-size: 13px; }
.topbar-actions { display: flex; align-items: center; gap: 2px; position: relative; }

.icon-btn {
  width: 30px; height: 30px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-mid); flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface); color: var(--ink); }
.icon-btn svg { width: 16px; height: 16px; display: block; pointer-events: none; }

/* --- character selector --- */
.char-bar {
  padding: 6px 14px 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.char-selector-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 10px; text-align: left;
}
.char-selector-btn:hover { border-color: var(--accent); }
.char-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.char-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.char-caret { color: var(--ink-dim); flex-shrink: 0; }
.char-caret svg { width: 12px; height: 12px; display: block; }

/* --- character dropdown --- */
.char-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface-hi); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 8px 24px var(--shadow);
  z-index: 40; overflow: hidden;
}
.char-dropdown-inner { max-height: 260px; overflow-y: auto; }
.char-option {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; font-size: 13px; width: 100%; text-align: left;
}
.char-option:hover { background: var(--surface); }
.char-option.active { background: rgba(232,163,61,0.08); }
.char-option .char-dot { width: 9px; height: 9px; }
.char-option-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.char-option-actions { display: flex; gap: 2px; opacity: 0; }
.char-option:hover .char-option-actions { opacity: 1; }
.char-action-btn {
  width: 22px; height: 22px; border-radius: 4px; display: flex;
  align-items: center; justify-content: center; color: var(--ink-dim);
}
.char-action-btn:hover { background: var(--border); color: var(--ink); }
.char-action-btn.del:hover { color: var(--danger); }
.char-action-btn svg { width: 12px; height: 12px; display: block; }
.char-dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
.char-add-row {
  padding: 8px 12px; display: flex; gap: 8px; align-items: center;
}
.char-add-row input {
  flex: 1; font-size: 13px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px;
  min-width: 0;
}
.char-add-row input:focus { border-color: var(--accent); outline: none; }
.char-color-pick { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; padding: 0; overflow: hidden; flex-shrink: 0; }
.char-color-pick input[type=color] { width: 200%; height: 200%; margin: -50%; border: none; cursor: pointer; }
.char-add-btn {
  font-size: 12px; font-weight: 600; padding: 5px 10px;
  background: var(--accent); color: var(--accent-ink); border-radius: 5px;
  white-space: nowrap; flex-shrink: 0;
}
.char-add-btn:hover { filter: brightness(1.06); }

/* --- search & tags --- */
.search-row { padding: 8px 14px 6px; flex-shrink: 0; }
.search-row input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; font-size: 13px;
}
.search-row input::placeholder { color: var(--ink-dim); }
.tag-row { padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; }
.tag-chip {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border);
  color: var(--ink-mid); line-height: 1.4; white-space: nowrap;
}
.tag-chip.active { border-color: var(--accent); color: var(--ink); background: var(--surface); }

/* --- note list --- */
.note-list { flex: 1; overflow-y: auto; padding: 4px 12px 12px; }
.note-card {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--border); border-radius: 5px;
  padding: 10px 12px; margin-bottom: 7px; cursor: pointer;
}
.note-card::after {
  content: ""; position: absolute; top: 8px; right: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--hole); border: 1px solid var(--border);
}
.note-card.active { background: var(--surface-hi); border-color: var(--accent); box-shadow: 0 2px 10px var(--shadow); }
.note-card-title { font-weight: 600; font-size: 13.5px; margin: 0 18px 3px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-card-title.untitled { color: var(--ink-mid); font-weight: 400; font-style: italic; }
.note-card-snippet { font-size: 12px; color: var(--ink-mid); margin: 0 0 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-card-meta { display: flex; justify-content: space-between; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-dim); }
.note-card-tags { display: flex; gap: 4px; overflow: hidden; }
.note-card-tags span { white-space: nowrap; }

/* --- bottom bar --- */
.sidebar-bottom { padding: 10px 14px 14px; flex-shrink: 0; }
.user-row { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.user-row img, .avatar-fallback { width: 24px; height: 24px; border-radius: 50%; }
.avatar-fallback { background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--ink-mid); }
.user-row .user-name { font-size: 12px; color: var(--ink-mid); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.new-note-btn {
  width: 100%; padding: 9px; border-radius: 6px; background: var(--accent);
  color: var(--accent-ink); font-weight: 600; font-size: 13px;
}
.new-note-btn:hover { filter: brightness(1.06); }

/* --- settings menu --- */
.settings-menu {
  position: absolute; bottom: 38px; right: 0;
  background: var(--surface-hi); border: 1px solid var(--border);
  border-radius: 7px; box-shadow: 0 6px 20px var(--shadow);
  min-width: 160px; z-index: 50; overflow: hidden;
}
.settings-menu button {
  display: block; width: 100%; text-align: left;
  padding: 9px 13px; font-size: 13px;
}
.settings-menu button:hover { background: var(--surface); }
.settings-menu button.danger { color: var(--danger); }

.empty-list { padding: 28px 12px; color: var(--ink-dim); font-size: 13px; line-height: 1.6; text-align: center; }

/* ===================== EDITOR ===================== */
.editor { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
.editor-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--ink-dim); font-size: 14px; text-align: center; padding: 30px;
}

/* --- editor head --- */
.editor-head { padding: 14px 26px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.editor-toprow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.back-btn { display: none; color: var(--ink-mid); }
.title-input { flex: 1; font-size: 22px; font-weight: 600; background: none; min-width: 0; }
.title-input::placeholder { color: var(--ink-dim); font-weight: 400; }
.delete-btn { color: var(--ink-mid); flex-shrink: 0; }
.delete-btn:hover { color: var(--danger); }

.tag-editor { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 8px; }
.tag-chip-edit {
  display: flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 3px 6px 3px 8px; border-radius: 100px;
  background: var(--surface); border: 1px solid var(--border);
}
.tag-chip-edit button { color: var(--ink-dim); font-size: 13px; line-height: 1; padding: 0 1px; }
.tag-chip-edit button:hover { color: var(--danger); }
.tag-input { font-family: 'IBM Plex Mono', monospace; font-size: 11px; min-width: 80px; padding: 3px 2px; color: var(--ink-mid); }

.editor-statusrow { display: flex; align-items: center; justify-content: space-between; }
.status-line { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-dim); }

/* --- split body: textarea left, preview right --- */
.editor-body {
  flex: 1; display: flex; overflow: hidden;
}
.editor-write {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  border-right: 1px solid var(--border);
  padding: 18px 22px 30px;
  overflow-y: auto;
}
.body-textarea {
  flex: 1; width: 100%; resize: none;
  font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; line-height: 1.75;
  min-height: 100%; background: transparent;
}
.body-textarea::placeholder { color: var(--ink-dim); }

.editor-preview {
  flex: 1; min-width: 0; padding: 18px 26px 30px;
  overflow-y: auto;
}
.preview-content { font-size: 15px; line-height: 1.75; }
.preview-content h1, .preview-content h2, .preview-content h3 { font-family: 'IBM Plex Mono', monospace; margin-top: 1.3em; margin-bottom: 0.4em; }
.preview-content h1 { font-size: 1.5em; }
.preview-content h2 { font-size: 1.2em; }
.preview-content h3 { font-size: 1em; }
.preview-content p { margin-bottom: 0.8em; }
.preview-content code { font-family: 'IBM Plex Mono', monospace; background: var(--surface); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; font-size: 0.87em; }
.preview-content pre { background: var(--surface); border: 1px solid var(--border); padding: 12px 14px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
.preview-content pre code { background: none; border: none; padding: 0; }
.preview-content blockquote { border-left: 3px solid var(--accent); margin: 0.8em 0; padding: 2px 0 2px 14px; color: var(--ink-mid); }
.preview-content a { color: var(--teal); }
.preview-content ul, .preview-content ol { padding-left: 20px; margin-bottom: 0.8em; }
.preview-content li { margin-bottom: 0.2em; }
.preview-content hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
.preview-content table { border-collapse: collapse; width: 100%; margin-bottom: 1em; font-size: 0.93em; }
.preview-content th, .preview-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.preview-content th { background: var(--surface); font-weight: 600; }
.preview-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em;
  color: var(--ink-dim); margin-bottom: 14px; text-transform: uppercase;
}
.write-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em;
  color: var(--ink-dim); margin-bottom: 14px; text-transform: uppercase;
}

/* ===================== OVERLAYS ===================== */
.overlay-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 60;
  animation: fadeIn 0.1s ease;
}
.modal {
  background: var(--surface-hi); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px 22px; max-width: 320px; width: 90%;
  box-shadow: 0 10px 30px var(--shadow);
}
.modal p { margin-bottom: 16px; font-size: 14px; line-height: 1.5; color: var(--ink-mid); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.modal-actions button { padding: 7px 14px; border-radius: 5px; font-size: 13px; font-weight: 500; }
.btn-cancel { background: var(--surface); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: #fff; }

/* char edit modal */
.modal-title { font-weight: 600; font-size: 15px; margin-bottom: 14px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 12px; color: var(--ink-dim); margin-bottom: 5px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.08em; }
.modal-field input[type=text] {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 7px 9px; font-size: 14px;
}
.modal-field input[type=text]:focus { border-color: var(--accent); outline: none; }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--ink); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface-hi); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 6px; font-size: 13px;
  box-shadow: 0 6px 18px var(--shadow); z-index: 70; white-space: nowrap;
}
.hidden { display: none !important; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===================== MOBILE ===================== */
@media (max-width: 820px) {
  .app { position: relative; overflow: hidden; }
  .sidebar, .editor { width: 100%; min-width: 100%; flex: 0 0 100%; }
  .editor { position: absolute; top: 0; left: 100%; transition: left 0.2s ease; background: var(--bg); }
  .app.show-editor .editor { left: 0; }
  .app.show-editor .sidebar { display: none; }
  .back-btn { display: flex !important; }
  .editor-head { padding: 12px 16px 8px; }
  .editor-body { flex-direction: column; }
  .editor-write { border-right: none; border-bottom: 1px solid var(--border); flex: 0 0 40vh; }
  .editor-preview { flex: 1; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <span class="login-mark">¶</span>
    <h1>LEDGER</h1>
    <p>Log in with Discord to access your character notes.</p>
    <a class="discord-btn" href="/auth/discord">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.6 12.6 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.2 14.2 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .078-.01c3.927 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .079.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.001-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.028M8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.955 2.418-2.157 2.418m7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418"/></svg>
      Continue with Discord
    </a>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-topbar">
      <div class="brand">
        <span class="brand-mark">¶</span>
        <span class="brand-name">LEDGER</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
          <!-- filled by JS -->
        </button>
        <button class="icon-btn" id="settingsToggle" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-menu hidden" id="settingsMenu">
          <button id="clearNotesBtn" class="danger">Clear character's notes</button>
          <button id="logoutBtn">Log out</button>
        </div>
      </div>
    </div>

    <!-- CHARACTER SELECTOR -->
    <div class="char-bar">
      <div style="position:relative;">
        <button class="char-selector-btn" id="charSelectorBtn">
          <span class="char-dot" id="charDot"></span>
          <span class="char-name" id="charNameLabel">All notes</span>
          <span class="char-caret">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </button>
        <div class="char-dropdown hidden" id="charDropdown">
          <div class="char-dropdown-inner" id="charList"></div>
          <div class="char-dropdown-divider"></div>
          <div class="char-add-row">
            <label class="char-color-pick" id="newCharColorWrap" title="Pick color">
              <input type="color" id="newCharColor" value="#e8a33d" />
            </label>
            <input type="text" id="newCharInput" placeholder="New character name…" maxlength="64" />
            <button class="char-add-btn" id="newCharBtn">Add</button>
          </div>
        </div>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search notes…" />
    </div>
    <div class="tag-row" id="tagRow"></div>
    <div class="note-list" id="noteList"></div>

    <div class="sidebar-bottom">
      <div class="user-row" id="userRow"></div>
      <button class="new-note-btn" id="newNoteBtn">+ New note</button>
    </div>
  </aside>

  <!-- EDITOR -->
  <main class="editor" id="editor">
    <div class="editor-placeholder">Select a note or create one.</div>
  </main>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay-bg hidden" id="confirmOverlay">
  <div class="modal">
    <p id="confirmText"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<!-- CHAR EDIT MODAL -->
<div class="overlay-bg hidden" id="charEditOverlay">
  <div class="modal">
    <div class="modal-title">Edit character</div>
    <div class="modal-field">
      <label>NAME</label>
      <input type="text" id="charEditName" maxlength="64" />
    </div>
    <div class="modal-field">
      <label>COLOR</label>
      <div class="color-row" id="charEditColors"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="charEditCancel">Cancel</button>
      <button class="btn-primary" id="charEditSave">Save</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
(function () {
"use strict";

var CHAR_COLORS = ["#e8a33d","#4fa8a0","#c97b8e","#7c8cc9","#9bb05a","#cf9bd6","#e07b54","#5fa8d4"];
var TAG_PALETTE = ["#e8a33d","#4fa8a0","#c97b8e","#7c8cc9","#9bb05a","#cf9bd6"];

var state = {
  theme: localStorage.getItem("ledger-theme") || "dark",
  user: null,
  characters: [],   // [{id, name, color}]
  characterId: "__all__", // currently selected character id or "__all__"
  notes: {},
  selectedId: null,
  search: "",
  activeTags: new Set()
};

var saveTimers = {};
var saveStatus = {};
var charDropdownOpen = false;
var pendingAction = null; // {type: 'deleteNote'|'clearNotes'|'deleteChar', id?}
var editingCharId = null;

document.documentElement.setAttribute("data-theme", state.theme);

// ---------- utils ----------
function esc(s) { var d = document.createElement("div"); d.textContent = s||""; return d.innerHTML; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function tagColor(t) { var s=0; for(var i=0;i<t.length;i++) s+=t.charCodeAt(i); return TAG_PALETTE[s%TAG_PALETTE.length]; }
function relTime(ts) {
  if(!ts) return "";
  var d=Date.now()-ts, m=Math.floor(d/60000);
  if(m<1) return "just now"; if(m<60) return m+"m ago";
  var h=Math.floor(m/60); if(h<24) return h+"h ago";
  var dy=Math.floor(h/24); if(dy<7) return dy+"d ago";
  return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function snippet(body) {
  var s=(body||"").replace(/[#*_`>~-]/g,"").replace(/\s+/g," ").trim();
  return s.length>85?s.slice(0,85)+"…":s;
}
function wc(body) { var t=(body||"").trim(); return t?t.split(/\s+/).length:0; }
function renderMd(body) {
  if(!body||!body.trim()) return "";
  return DOMPurify.sanitize(marked.parse(body));
}
function showToast(msg) {
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.remove("hidden");
  setTimeout(function(){t.classList.add("hidden");},2000);
}

// ---------- API ----------
function api(url, opts) {
  return fetch(url, Object.assign({headers:{"Content-Type":"application/json"}}, opts))
    .then(function(r){
      if(r.status===401){showLogin();throw new Error("unauth");}
      if(!r.ok) throw new Error("request failed");
      return r.status===204?null:r.json();
    });
}

// ---------- Auth ----------
function showLogin() {
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("app").classList.remove("ready");
}
function showApp() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("app").classList.add("ready");
}

// ---------- Boot ----------
function boot() {
  api("/api/me").then(function(user){
    state.user=user;
    return api("/api/characters");
  }).then(function(chars){
    state.characters=chars||[];
    return loadNotes();
  }).then(function(){
    showApp();
    render();
  }).catch(function(){});
}

function loadNotes() {
  return api("/api/notes?characterId="+encodeURIComponent(state.characterId))
    .then(function(arr){
      state.notes={};
      (arr||[]).forEach(function(n){state.notes[n.id]=n;});
    });
}

// ---------- current character obj ----------
function currentChar() {
  if(state.characterId==="__all__") return null;
  return state.characters.find(function(c){return c.id===state.characterId;})||null;
}

// ---------- Note mutations ----------
function createNote() {
  var charId = state.characterId==="__all__" ? null : state.characterId;
  api("/api/notes",{method:"POST",body:JSON.stringify({title:"",body:"",tags:[],characterId:charId})})
    .then(function(note){
      state.notes[note.id]=note;
      state.selectedId=note.id;
      render();
      document.getElementById("app").classList.add("show-editor");
      var el=document.getElementById("titleInput");
      if(el) el.focus();
    });
}

function scheduleSave(note) {
  saveStatus[note.id]="saving";
  renderStatus();
  clearTimeout(saveTimers[note.id]);
  saveTimers[note.id]=setTimeout(function(){
    api("/api/notes/"+note.id,{method:"PUT",body:JSON.stringify({title:note.title,body:note.body,tags:note.tags})})
      .then(function(){saveStatus[note.id]="saved"; renderStatus();})
      .catch(function(){saveStatus[note.id]="error"; renderStatus();});
  },500);
}

function deleteNote(id) {
  api("/api/notes/"+id,{method:"DELETE"}).then(function(){
    delete state.notes[id];
    if(state.selectedId===id){state.selectedId=null;}
    document.getElementById("app").classList.remove("show-editor");
    render();
    showToast("Note deleted");
  });
}

function clearNotes() {
  api("/api/notes?characterId="+encodeURIComponent(state.characterId),{method:"DELETE"}).then(function(){
    state.notes={};
    state.selectedId=null;
    document.getElementById("app").classList.remove("show-editor");
    render();
    showToast("Notes cleared");
  });
}

// ---------- Character mutations ----------
function selectCharacter(id) {
  state.characterId=id;
  state.selectedId=null;
  state.activeTags=new Set();
  state.search="";
  document.getElementById("searchInput").value="";
  closeCharDropdown();
  loadNotes().then(function(){render();});
  document.getElementById("app").classList.remove("show-editor");
}

function addCharacter() {
  var name=document.getElementById("newCharInput").value.trim();
  var color=document.getElementById("newCharColor").value;
  if(!name) return;
  api("/api/characters",{method:"POST",body:JSON.stringify({name:name,color:color})})
    .then(function(c){
      state.characters.push(c);
      document.getElementById("newCharInput").value="";
      renderCharDropdown();
    });
}

function deleteCharacter(id) {
  api("/api/characters/"+id,{method:"DELETE"}).then(function(){
    state.characters=state.characters.filter(function(c){return c.id!==id;});
    if(state.characterId===id){
      state.characterId="__all__";
      state.selectedId=null;
      loadNotes().then(render);
    } else {
      renderCharDropdown();
      renderCharBar();
    }
    showToast("Character deleted");
  });
}

function openCharEdit(id) {
  var c=state.characters.find(function(x){return x.id===id;});
  if(!c) return;
  editingCharId=id;
  document.getElementById("charEditName").value=c.name;
  var colorRow=document.getElementById("charEditColors");
  colorRow.innerHTML=CHAR_COLORS.map(function(col){
    return '<button class="color-swatch'+(c.color===col?" selected":"")+'" data-color="'+col+'" style="background:'+col+'" aria-label="'+col+'"></button>';
  }).join("");
  colorRow.querySelectorAll(".color-swatch").forEach(function(btn){
    btn.addEventListener("click",function(){
      colorRow.querySelectorAll(".color-swatch").forEach(function(b){b.classList.remove("selected");});
      btn.classList.add("selected");
    });
  });
  closeCharDropdown();
  document.getElementById("charEditOverlay").classList.remove("hidden");
  document.getElementById("charEditName").focus();
}

function saveCharEdit() {
  if(!editingCharId) return;
  var name=document.getElementById("charEditName").value.trim();
  if(!name) return;
  var selected=document.querySelector("#charEditColors .color-swatch.selected");
  var color=selected?selected.getAttribute("data-color"):CHAR_COLORS[0];
  api("/api/characters/"+editingCharId,{method:"PUT",body:JSON.stringify({name:name,color:color})})
    .then(function(c){
      var idx=state.characters.findIndex(function(x){return x.id===c.id;});
      if(idx>-1) state.characters[idx]=c;
      document.getElementById("charEditOverlay").classList.add("hidden");
      editingCharId=null;
      renderCharDropdown();
      renderCharBar();
      renderList();
    });
}

// ---------- Confirm ----------
function openConfirm(text, action) {
  pendingAction=action;
  document.getElementById("confirmText").textContent=text;
  document.getElementById("confirmOverlay").classList.remove("hidden");
}
function closeConfirm() {
  pendingAction=null;
  document.getElementById("confirmOverlay").classList.add("hidden");
}

// ---------- Render ----------
function render() {
  renderThemeIcon();
  renderUserRow();
  renderCharBar();
  renderCharDropdown();
  renderTagRow();
  renderList();
  renderEditor();
}

function renderThemeIcon() {
  var btn=document.getElementById("themeToggle");
  if(state.theme==="dark") {
    btn.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  } else {
    btn.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
}

function renderUserRow() {
  var row=document.getElementById("userRow");
  if(!state.user){row.innerHTML="";return;}
  var img=state.user.avatar
    ?'<img src="'+esc(state.user.avatar)+'" alt="" />'
    :'<div class="avatar-fallback">'+esc((state.user.username||"?")[0].toUpperCase())+'</div>';
  row.innerHTML=img+'<span class="user-name">'+esc(state.user.username)+'</span>';
}

function renderCharBar() {
  var c=currentChar();
  var dot=document.getElementById("charDot");
  var label=document.getElementById("charNameLabel");
  if(c){
    dot.style.background=c.color;
    dot.style.display="block";
    label.textContent=c.name;
  } else {
    dot.style.display="none";
    label.textContent="All notes";
  }
}

function renderCharDropdown() {
  var list=document.getElementById("charList");
  // "All notes" option
  var allHtml='<button class="char-option'+(state.characterId==="__all__"?" active":"")+'" data-id="__all__">'+
    '<span class="char-dot" style="background:var(--ink-dim)"></span>'+
    '<span class="char-option-name">All notes</span>'+
    '</button>';
  var charsHtml=state.characters.map(function(c){
    var active=state.characterId===c.id;
    return '<button class="char-option'+(active?" active":"")+'" data-id="'+c.id+'">'+
      '<span class="char-dot" style="background:'+c.color+'"></span>'+
      '<span class="char-option-name">'+esc(c.name)+'</span>'+
      '<span class="char-option-actions">'+
        '<button class="char-action-btn" data-edit="'+c.id+'" title="Edit" onclick="event.stopPropagation()">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'+
        '</button>'+
        '<button class="char-action-btn del" data-del="'+c.id+'" title="Delete" onclick="event.stopPropagation()">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>'+
        '</button>'+
      '</span>'+
    '</button>';
  }).join("");
  list.innerHTML=allHtml+charsHtml;

  // color preview on picker
  var colorPick=document.getElementById("newCharColor");
  var colorWrap=document.getElementById("newCharColorWrap");
  colorWrap.style.background=colorPick.value;
  colorPick.addEventListener("input",function(){colorWrap.style.background=colorPick.value;});

  list.querySelectorAll(".char-option[data-id]").forEach(function(btn){
    btn.addEventListener("click",function(){selectCharacter(btn.getAttribute("data-id"));});
  });
  list.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.addEventListener("click",function(e){e.stopPropagation();openCharEdit(btn.getAttribute("data-edit"));});
  });
  list.querySelectorAll("[data-del]").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var id=btn.getAttribute("data-del");
      var c=state.characters.find(function(x){return x.id===id;});
      openConfirm("Delete character \""+(c?c.name:"")+"\" and all their notes? This can't be undone.",{type:"deleteChar",id:id});
    });
  });
}

function openCharDropdown() {
  charDropdownOpen=true;
  document.getElementById("charDropdown").classList.remove("hidden");
  renderCharDropdown();
  setTimeout(function(){document.getElementById("newCharInput").focus();},50);
}
function closeCharDropdown() {
  charDropdownOpen=false;
  document.getElementById("charDropdown").classList.add("hidden");
}

function getFiltered() {
  var arr=Object.values(state.notes);
  var q=state.search.trim().toLowerCase();
  if(q) arr=arr.filter(function(n){
    return (n.title||"").toLowerCase().indexOf(q)>-1||
           (n.body||"").toLowerCase().indexOf(q)>-1||
           n.tags.some(function(t){return t.indexOf(q)>-1;});
  });
  if(state.activeTags.size) arr=arr.filter(function(n){
    return n.tags.some(function(t){return state.activeTags.has(t);});
  });
  arr.sort(function(a,b){return b.updatedAt-a.updatedAt;});
  return arr;
}

function allTags() {
  var set=new Set();
  Object.values(state.notes).forEach(function(n){n.tags.forEach(function(t){set.add(t);});});
  return Array.from(set).sort();
}

function renderTagRow() {
  var row=document.getElementById("tagRow");
  var tags=allTags();
  if(!tags.length){row.innerHTML="";return;}
  row.innerHTML=tags.map(function(t){
    var a=state.activeTags.has(t);
    return '<button class="tag-chip'+(a?" active":"")+'" data-tag="'+esc(t)+'">'+esc(t)+'</button>';
  }).join("");
  row.querySelectorAll(".tag-chip").forEach(function(btn){
    btn.addEventListener("click",function(){
      var t=btn.getAttribute("data-tag");
      if(state.activeTags.has(t)) state.activeTags.delete(t); else state.activeTags.add(t);
      renderTagRow(); renderList();
    });
  });
}

function renderList() {
  var list=document.getElementById("noteList");
  if(!Object.keys(state.notes).length){
    list.innerHTML='<div class="empty-list">No notes yet.<br>Hit "+ New note" to start.</div>'; return;
  }
  var filtered=getFiltered();
  if(!filtered.length){list.innerHTML='<div class="empty-list">No notes match.</div>'; return;}
  var c=currentChar();
  list.innerHTML=filtered.map(function(n){
    var borderColor=c?c.color:(n.tags.length?tagColor(n.tags[0]):"var(--border)");
    var active=n.id===state.selectedId;
    var titleHtml=n.title
      ?'<p class="note-card-title">'+esc(n.title)+'</p>'
      :'<p class="note-card-title untitled">Untitled</p>';
    var tagsHtml=n.tags.slice(0,3).map(function(t){
      return '<span style="color:'+tagColor(t)+'">#'+esc(t)+'</span>';
    }).join(" ");
    return '<div class="note-card'+(active?" active":"")+'" data-id="'+n.id+'" style="border-left-color:'+borderColor+'">'+
      titleHtml+
      '<p class="note-card-snippet">'+(esc(snippet(n.body))||"No content yet")+'</p>'+
      '<div class="note-card-meta"><span>'+relTime(n.updatedAt)+'</span>'+
      '<div class="note-card-tags">'+tagsHtml+'</div></div></div>';
  }).join("");
  list.querySelectorAll(".note-card").forEach(function(card){
    card.addEventListener("click",function(){
      state.selectedId=card.getAttribute("data-id");
      render();
      document.getElementById("app").classList.add("show-editor");
    });
  });
}

function renderEditor() {
  var editor=document.getElementById("editor");
  var note=state.notes[state.selectedId];
  if(!note){
    editor.innerHTML='<div class="editor-placeholder">Select a note or create one.</div>';
    return;
  }
  var statusText={saving:"Saving…",saved:"Saved",error:"Error saving"}[saveStatus[note.id]]||"";
  var tagChips=note.tags.map(function(t){
    return '<span class="tag-chip-edit" style="color:'+tagColor(t)+'">#'+esc(t)+
      '<button data-remove-tag="'+esc(t)+'" aria-label="Remove">×</button></span>';
  }).join("");

  editor.innerHTML=
    '<div class="editor-head">'+
      '<div class="editor-toprow">'+
        '<button class="icon-btn back-btn" id="backBtn" aria-label="Back">'+
          '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'+
        '</button>'+
        '<input class="title-input" id="titleInput" placeholder="Untitled" value="'+esc(note.title)+'" />'+
        '<button class="icon-btn delete-btn" id="deleteBtn" aria-label="Delete note">'+
          '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>'+
        '</button>'+
      '</div>'+
      '<div class="tag-editor" id="tagEditor">'+tagChips+
        '<input class="tag-input" id="tagInput" placeholder="+ tag" />'+
      '</div>'+
      '<div class="editor-statusrow">'+
        '<div class="status-line" id="statusLine">'+wc(note.body)+' words'+
          (statusText?' · '+statusText:'')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="editor-body">'+
      '<div class="editor-write">'+
        '<div class="write-label">MARKDOWN</div>'+
        '<textarea class="body-textarea" id="bodyTextarea" placeholder="Start writing…">'+esc(note.body)+'</textarea>'+
      '</div>'+
      '<div class="editor-preview">'+
        '<div class="preview-label">PREVIEW</div>'+
        '<div class="preview-content" id="previewContent">'+
          (renderMd(note.body)||'<span style="color:var(--ink-dim);font-style:italic">Preview appears here as you type.</span>')+
        '</div>'+
      '</div>'+
    '</div>';

  // wire events
  document.getElementById("backBtn").addEventListener("click",function(){
    document.getElementById("app").classList.remove("show-editor");
  });

  var titleInput=document.getElementById("titleInput");
  titleInput.addEventListener("input",function(){
    note.title=titleInput.value; note.updatedAt=Date.now();
    scheduleSave(note); renderList();
  });

  var ta=document.getElementById("bodyTextarea");
  ta.addEventListener("input",function(){
    note.body=ta.value; note.updatedAt=Date.now();
    scheduleSave(note);
    renderList();
    // live preview
    var preview=document.getElementById("previewContent");
    if(preview) preview.innerHTML=renderMd(note.body)||'<span style="color:var(--ink-dim);font-style:italic">Preview appears here as you type.</span>';
  });

  document.getElementById("deleteBtn").addEventListener("click",function(){
    openConfirm("Delete \""+(note.title||"Untitled")+"\"? This can't be undone.",{type:"deleteNote",id:note.id});
  });

  document.querySelectorAll("[data-remove-tag]").forEach(function(btn){
    btn.addEventListener("click",function(){
      note.tags=note.tags.filter(function(x){return x!==btn.getAttribute("data-remove-tag");});
      scheduleSave(note); renderEditor(); renderTagRow();
    });
  });

  var tagInput=document.getElementById("tagInput");
  tagInput.addEventListener("keydown",function(e){
    if(e.key==="Enter"||e.key===","){
      e.preventDefault();
      var v=tagInput.value.trim().toLowerCase().replace(/,/g,"");
      if(v&&note.tags.indexOf(v)===-1){note.tags.push(v); scheduleSave(note); renderEditor(); renderTagRow();}
      else tagInput.value="";
    } else if(e.key==="Backspace"&&!tagInput.value&&note.tags.length){
      note.tags.pop(); scheduleSave(note); renderEditor(); renderTagRow();
    }
  });
}

function renderStatus() {
  var el=document.getElementById("statusLine");
  var note=state.notes[state.selectedId];
  if(!el||!note) return;
  var statusText={saving:"Saving…",saved:"Saved",error:"Error saving"}[saveStatus[note.id]]||"";
  el.textContent=wc(note.body)+" words"+(statusText?" · "+statusText:"");
}

// ---------- Wire up global controls ----------
document.getElementById("charSelectorBtn").addEventListener("click",function(e){
  e.stopPropagation();
  if(charDropdownOpen) closeCharDropdown(); else openCharDropdown();
});

document.getElementById("newCharBtn").addEventListener("click",addCharacter);
document.getElementById("newCharInput").addEventListener("keydown",function(e){
  if(e.key==="Enter") addCharacter();
});

document.getElementById("themeToggle").addEventListener("click",function(){
  state.theme=state.theme==="dark"?"light":"dark";
  localStorage.setItem("ledger-theme",state.theme);
  document.documentElement.setAttribute("data-theme",state.theme);
  renderThemeIcon();
});

document.getElementById("settingsToggle").addEventListener("click",function(e){
  e.stopPropagation();
  document.getElementById("settingsMenu").classList.toggle("hidden");
});

document.getElementById("clearNotesBtn").addEventListener("click",function(){
  document.getElementById("settingsMenu").classList.add("hidden");
  var c=currentChar();
  var label=c?"character \""+c.name+"\"":"all characters";
  openConfirm("Clear all notes for "+label+"? This can't be undone.",{type:"clearNotes"});
});

document.getElementById("logoutBtn").addEventListener("click",function(){
  document.getElementById("settingsMenu").classList.add("hidden");
  api("/auth/logout",{method:"POST"}).then(function(){
    state.notes={}; state.selectedId=null; state.user=null;
    showLogin();
  });
});

document.getElementById("newNoteBtn").addEventListener("click",createNote);
document.getElementById("searchInput").addEventListener("input",function(e){
  state.search=e.target.value; renderTagRow(); renderList();
});

// confirm modal
document.getElementById("confirmCancel").addEventListener("click",closeConfirm);
document.getElementById("confirmOk").addEventListener("click",function(){
  if(!pendingAction){closeConfirm();return;}
  if(pendingAction.type==="deleteNote") deleteNote(pendingAction.id);
  else if(pendingAction.type==="clearNotes") clearNotes();
  else if(pendingAction.type==="deleteChar") deleteCharacter(pendingAction.id);
  closeConfirm();
});
document.getElementById("confirmOverlay").addEventListener("click",function(e){
  if(e.target===this) closeConfirm();
});

// char edit modal
document.getElementById("charEditCancel").addEventListener("click",function(){
  document.getElementById("charEditOverlay").classList.add("hidden");
  editingCharId=null;
});
document.getElementById("charEditSave").addEventListener("click",saveCharEdit);
document.getElementById("charEditOverlay").addEventListener("click",function(e){
  if(e.target===this){document.getElementById("charEditOverlay").classList.add("hidden"); editingCharId=null;}
});

// close dropdowns/menus on outside click
document.addEventListener("click",function(e){
  var dropdown=document.getElementById("charDropdown");
  var btn=document.getElementById("charSelectorBtn");
  if(charDropdownOpen&&!dropdown.contains(e.target)&&!btn.contains(e.target)){
    closeCharDropdown();
  }
  var menu=document.getElementById("settingsMenu");
  var tog=document.getElementById("settingsToggle");
  if(!menu.contains(e.target)&&!tog.contains(e.target)){
    menu.classList.add("hidden");
  }
});

boot();
})();
</script>
</body>
</html>
